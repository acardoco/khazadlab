apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-restic-backup
  namespace: immich
spec:
  schedule: "30 3 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: restic
              image: restic/restic:0.17.3
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-secret
                      key: RESTIC_PASSWORD
                - name: RESTIC_CACHE_DIR
                  value: /cache
              command: ["/bin/sh","-lc"]
              args:
                - |
                  set -euo pipefail
                  REPO="/repo/immich/restic"
                  mkdir -p "$REPO"

                  if [ ! -f "$REPO/config" ]; then
                    restic init --repo "$REPO"
                  fi

                  # NFSv3: limpia locks colgados si hubo cortes
                  restic --repo "$REPO" unlock || true

                  restic --repo "$REPO" backup \
                    /data/upload \
                    /data/profile \
                    --verbose

                  restic --repo "$REPO" forget --prune \
                    --keep-weekly 8 --keep-monthly 12

                  restic cache --cleanup

                  restic --repo "$REPO" snapshots
              volumeMounts:
                - name: immich-library
                  mountPath: /data
                  readOnly: true
                - name: nfs-backup
                  mountPath: /repo
                - name: restic-cache
                  mountPath: /cache
          volumes:
            - name: immich-library
              persistentVolumeClaim:
                claimName: immich-library
            - name: nfs-backup
              persistentVolumeClaim:
                claimName: immich-backup-nfs
            - name: restic-cache
              emptyDir: {}
