apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-agent
  namespace: openclaw
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-ops-min
  namespace: openclaw
rules:
  # Lectura básica para "kubectl get ..." y troubleshooting
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]

  # Reinicio controlado:
  # Opción A: borrar pods (los recrea el controlador)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]

  # Opción B: rollout restart = patch al workload (anotación)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-ops-min
  namespace: openclaw
subjects:
  - kind: ServiceAccount
    name: openclaw-agent
    namespace: openclaw
roleRef:
  kind: Role
  name: openclaw-ops-min
  apiGroup: rbac.authorization.k8s.io