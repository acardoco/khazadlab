apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-k8s
  namespace: ai-ops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw-k8s
      automountServiceAccountToken: true
      nodeSelector:
        workload: ai
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "ai"
          effect: "NoSchedule"
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: openclaw
          image: ghcr.io/acardoco/khazadlab/openclaw-kubectl:main
          imagePullPolicy: Always
          command: ["sh", "-lc"]
          args:
            - openclaw gateway --port 18789 --verbose
          ports:
            - containerPort: 18789
              name: gateway
          env:
            - name: HOME
              value: /data
            - name: OPENCLAW_STATE_DIR
              value: /data/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /config/openclaw.json
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: TLF
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TLF
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: state
              mountPath: /data
            - name: config
              mountPath: /config/openclaw.json
              subPath: openclaw.json
      volumes:
        - name: state
          emptyDir: {}
        - name: config
          configMap:
            name: openclaw-config