apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: ai-ops
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        }
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "agents": {
        "defaults": {
          "elevatedDefault": "full",
          "model": {
            "primary": "llm/gpt-5.4-mini",
            "fallbacks": ["llm/gpt-5.4-nano"]
          }
        }
      },
      "models": {
        "providers": {
          "llm": {
            "baseUrl": "https://api.openai.com/v1",
            "api": "openai-completions",
            "apiKey": "${OPENAI_API_KEY}",
            "models": [
              {
                "id": "gpt-5.4-mini",
                "name": "GPT-5.4 mini",
                "reasoning": false,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 128000,
                "maxTokens": 1024
              },
              {
                "id": "gpt-5.4-nano",
                "name": "GPT-5.4 nano",
                "reasoning": false,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 128000,
                "maxTokens": 1024
              }
            ]
          }
        }
      },
      "plugins": {
        "allow": ["whatsapp"],
        "entries": {
          "whatsapp": {
            "enabled": true
          }
        }
      },
      "channels": {
        "whatsapp": {
          "dmPolicy": "allowlist",
          "allowFrom": ["${TLF}"],
          "groupPolicy": "disabled"
        }
      },
      "commands": {
        "text": true,
        "bash": true,
        "bashForegroundMs": 5000
      },
      "tools": {
        "profile": "minimal",
        "allow": ["exec"],
        "elevated": {
          "enabled": true,
          "allowFrom": {
            "whatsapp": ["${TLF}"]
          }
        }
      },
      "exec": {
        "security": "full",
        "ask": "off"
      }
    }