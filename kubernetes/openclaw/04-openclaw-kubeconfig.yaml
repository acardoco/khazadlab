apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-kubeconfig
  namespace: ai-ops
data:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://kubernetes.default.svc
      name: in-cluster
    contexts:
    - context:
        cluster: in-cluster
        namespace: media
        user: openclaw
      name: openclaw
    current-context: openclaw
    users:
    - name: openclaw
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token