apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-readonly
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - persistentvolumeclaims
      - events
    verbs: ["get", "list", "watch"]

  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-readonly-binding
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: openclaw-k8s
    namespace: ai-ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-readonly